# Vectorless indexer configuration.
# All tunables used by index_document.py live here.

output_dir: contents
schema_version: vectorless-pageindex-lite/v1

input:
  inbox_dir: inbox
  archive_dir: archive
  extensions: [".pdf", ".md", ".markdown"]
  recursive: false
  archive_after_index: true
  archive_extensions: [".pdf"]
  max_parallel_files: 1
  stop_on_error: true

progress:
  enabled: true
  verbose: true
  # inline redraws the file dashboard in-place when stdout is a TTY.
  # log appends every status line. Use force_inline if your terminal supports
  # ANSI redraw but Python reports stdout as non-TTY.
  style: inline
  force_inline: false
  colors: true
  basic_update_every: 1
  summary_update_every: 1

title:
  prefer_cover_text: true
  cover_pages_to_scan: 3
  cover_max_lines: 4
  ignore_lines_regex: "^(note|edition|©|copyright|before using|merative and)"

llm:
  # Providers:
  #   pi_openai_codex  - uses ~/.pi/agent/auth.json ChatGPT Plus/Pro Codex OAuth token
  #   openai_responses - uses OPENAI_API_KEY with https://api.openai.com/v1/responses
  #   mock             - deterministic placeholders, useful for dry-runs only
  provider: pi_openai_codex
  model: gpt-5.4-mini
  # Leave null for Codex/ChatGPT subscription models, which may reject temperature.
  temperature:
  timeout_seconds: 120
  max_retries: 3
  # ChatGPT/Codex subscription auth can stall with concurrent requests.
  # Keep LLM calls serialized while allowing file parsing/output to run in parallel.
  max_parallel_requests: 1
  required: true

  # pi_openai_codex settings
  auth_path: ~/.pi/agent/auth.json
  auth_provider_key: openai-codex
  codex_base_url: https://chatgpt.com/backend-api
  originator: pi
  pi_agent_package_dir: /opt/homebrew/lib/node_modules/@mariozechner/pi-coding-agent

  # openai_responses settings
  openai_base_url: https://api.openai.com/v1
  openai_api_key_env: OPENAI_API_KEY

pdf:
  extraction_backend: pymupdf
  use_native_outline: true
  min_outline_items: 2

markdown:
  heading_based_tree: true

content:
  include_empty_pages: true
  normalize_whitespace: true
  collapse_blank_lines: true

indexing:
  # Structure discovery
  prefer_llm_structure_when_no_outline: true
  structure_preview_chars_per_page: 1200
  max_structure_pages_per_call: 80
  max_structure_nodes: 80

  # Add synthetic page-range children if a leaf section is too large.
  split_large_leaves: true
  max_pages_per_leaf: 10
  max_markdown_chars_per_leaf: 12000

  # Summaries
  generate_summaries: true
  summary_max_words: 90
  root_summary_max_words: 180
  summary_input_chars: 24000
  child_context_chars: 12000

output:
  slug_max_length: 80
  overwrite: true
  master_index_file: index.json
  write_metadata: true
  write_config_snapshot: true
  pretty_index_json: true
