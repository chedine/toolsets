<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Sessions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Nothing Design — Light Mode Tokens */
    --black: #F5F5F5;
    --surface: #FFFFFF;
    --surface-raised: #F0F0F0;
    --border: #E8E8E8;
    --border-visible: #CCCCCC;
    --text-disabled: #999999;
    --text-secondary: #666666;
    --text-primary: #1A1A1A;
    --text-display: #000000;
    --accent: #D71921;
    --interactive: #007AFF;

    /* Spacing (8px base) */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', 'DM Sans', system-ui, sans-serif;
    background: var(--black);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: var(--space-md) var(--space-md) var(--space-sm);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* Segmented control (Nothing style) */
  .seg-control {
    display: flex;
    border: 1px solid var(--border-visible);
    border-radius: 999px;
    overflow: hidden;
  }
  .seg-control button {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: var(--space-xs) 12px;
    cursor: pointer;
    transition: all 200ms cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .seg-control button:hover { color: var(--text-primary); }
  .seg-control button.active {
    background: var(--text-display);
    color: var(--black);
  }

  .sidebar-search {
    padding: 0 var(--space-md) var(--space-sm);
  }
  .sidebar-search input {
    width: 100%;
    font-family: 'Space Mono', monospace;
    background: var(--black);
    border: none;
    border-bottom: 1px solid var(--border-visible);
    padding: var(--space-sm) 0;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 200ms;
  }
  .sidebar-search input:focus { border-color: var(--text-primary); }
  .sidebar-search input::placeholder {
    color: var(--text-disabled);
    font-family: 'Space Mono', monospace;
  }

  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: var(--space-xs) 0;
  }

  /* Tree view */
  .tree-node { user-select: none; }
  .tree-dir {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-sm) var(--space-md);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .tree-dir:hover { color: var(--text-primary); }
  .tree-dir .arrow {
    font-size: 9px;
    transition: transform 200ms cubic-bezier(0.25, 0.1, 0.25, 1);
    width: 10px;
    text-align: center;
    color: var(--text-disabled);
  }
  .tree-dir .arrow.closed { transform: rotate(-90deg); }
  .tree-dir .count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-disabled);
  }
  .tree-children { padding-left: var(--space-md); }
  .tree-children.hidden { display: none; }

  /* Session items */
  .session-item {
    padding: 12px var(--space-md);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 150ms;
  }
  .session-item:last-child { border-bottom: none; }
  .session-item:hover { background: var(--surface-raised); }
  .session-item.active {
    background: var(--surface-raised);
    border-left: 2px solid var(--accent);
    padding-left: 14px;
  }
  .session-item .s-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text-primary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .session-item .s-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--text-disabled);
    margin-top: var(--space-xs);
  }

  /* Date group headers */
  .date-group-label {
    padding: var(--space-sm) var(--space-md);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-top: var(--space-sm);
  }

  /* ── Main ── */
  .main {
    overflow-y: auto;
    background: var(--black);
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-disabled);
  }

  /* Session header bar */
  .session-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px var(--space-lg);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .bar-info {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
  .bar-info span { color: var(--text-disabled); }

  /* Messages */
  .messages {
    padding: var(--space-xl) var(--space-lg);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    max-width: 860px;
    margin: 0 auto;
  }

  .msg-card {
    border-radius: 4px;
    padding: var(--space-md) 20px;
    position: relative;
  }

  /* User card: white surface, stands out */
  .msg-card.user {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--text-display);
  }
  /* Assistant card: recessed, raised surface */
  .msg-card.assistant {
    background: var(--surface-raised);
    border: 1px solid var(--border);
  }
  /* Tool result */
  .msg-card.toolResult {
    background: var(--black);
    border: 1px solid var(--border);
  }

  .msg-role {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-disabled);
    margin-bottom: 12px;
  }
  .msg-card.user .msg-role { color: var(--text-primary); }
  .msg-card.assistant .msg-role { color: var(--text-secondary); }
  .msg-card.toolResult .msg-role { color: var(--text-disabled); }

  .msg-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-primary);
  }

  /* Truncation */
  .msg-text.truncated {
    max-height: 130px;
    overflow: hidden;
    position: relative;
  }
  .msg-text.truncated::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: linear-gradient(transparent, var(--surface-raised));
    pointer-events: none;
  }

  .expand-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--text-disabled);
    cursor: pointer;
    padding: var(--space-xs) 0;
    margin-top: var(--space-sm);
    display: block;
    transition: color 200ms;
  }
  .expand-btn:hover { color: var(--text-primary); }

  /* Conversation vs Full mode */
  .messages[data-mode="conversation"] .msg-intermediate { display: none; }
  .messages[data-mode="conversation"] .msg-conv .thinking-content,
  .messages[data-mode="conversation"] .msg-conv .thinking-label,
  .messages[data-mode="conversation"] .msg-conv .tool-block { display: none; }

  /* Thinking */
  .thinking-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-disabled);
    margin-top: var(--space-sm);
    margin-bottom: var(--space-xs);
  }
  .thinking-content {
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px var(--space-md);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Tool blocks */
  .tool-block {
    background: var(--black);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-top: var(--space-sm);
    overflow: hidden;
  }
  .tool-header {
    padding: var(--space-sm) 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    transition: color 200ms;
  }
  .tool-header:hover { color: var(--text-primary); }
  .tool-header .t-arrow {
    font-size: 9px;
    transition: transform 200ms cubic-bezier(0.25, 0.1, 0.25, 1);
    color: var(--text-disabled);
  }
  .tool-header .t-arrow.closed { transform: rotate(-90deg); }
  .tool-body {
    padding: var(--space-sm) 12px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
    border-top: 1px solid var(--border);
  }
  .tool-body.hidden { display: none; }

  .tool-output {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-secondary);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Model change */
  .model-divider {
    text-align: center;
    padding: var(--space-xs);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-disabled);
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-2xl);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-disabled);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-visible); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-disabled); }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { max-height: 40vh; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Sessions</h1>
      <div class="seg-control view-toggle">
        <button data-view="tree">Tree</button>
        <button class="active" data-view="recent">Recent</button>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search…">
    </div>
    <div class="session-list" id="sessionList">
      <div class="loading">[loading]</div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty-state">[ select a session ]</div>
  </div>
</div>

<script>
const state = {
  sessions: [],
  activeId: null,
  view: 'recent',
  expanded: new Set(),
  searchQuery: '',
  searchResults: null,
};

async function fetchJSON(url) {
  const res = await fetch(url);
  return res.json();
}

// ── Init ──
async function init() {
  state.sessions = await fetchJSON('/api/sessions');
  renderSidebar();
  setupEvents();
  setupMainEvents();
}

// ── Events ──
function setupEvents() {
  document.querySelector('.view-toggle').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    state.view = btn.dataset.view;
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b === btn));
    renderSidebar();
  });

  let debounce;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(async () => {
      const q = e.target.value.trim();
      state.searchQuery = q.toLowerCase();
      if (q.length >= 2) {
        state.searchResults = await fetchJSON(`/api/search?q=${encodeURIComponent(q)}`);
      } else {
        state.searchResults = null;
      }
      renderSidebar();
    }, 350);
  });
}

// ── Sidebar render ──
function renderSidebar() {
  const el = document.getElementById('sessionList');

  if (state.searchResults && state.searchQuery) {
    el.innerHTML = buildSearchResults(state.searchResults);
    return;
  }

  let filtered = state.sessions;
  if (state.searchQuery) {
    filtered = filtered.filter(s =>
      s.title.toLowerCase().includes(state.searchQuery) ||
      s.project.toLowerCase().includes(state.searchQuery)
    );
  }
  if (state.view === 'tree') {
    el.innerHTML = buildTree(filtered);
  } else {
    el.innerHTML = buildRecent(filtered);
  }
}

function buildSearchResults(results) {
  if (!results.length) return '<div class="loading">[no results]</div>';
  let html = `<div class="date-group-label">${results.length} session${results.length !== 1 ? 's' : ''} found</div>`;
  for (const r of results) {
    const shortProject = (r.project || '').split('/').slice(-2).join('/');
    html += `<div class="session-item ${r.id === state.activeId ? 'active' : ''}" data-id="${esc(r.id)}">
      <div class="s-title">${esc(shortProject)}</div>
      <div class="s-meta">${formatTime(r.timestamp)} · ${r.matchCount} match${r.matchCount !== 1 ? 'es' : ''}</div>`;
    if (r.matches && r.matches.length) {
      const m = r.matches[0];
      html += `<div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text-secondary);margin-top:4px;line-height:1.4;background:var(--black);padding:4px 8px;border-radius:4px;overflow:hidden;max-height:36px">${highlightQuery(esc(m.snippet), state.searchQuery)}</div>`;
    }
    html += '</div>';
  }
  return html;
}

function highlightInHtml(html, query) {
  if (!query) return html;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return html.replace(/(<[^>]*>)|([^<]+)/g, (match, tag, text) => {
    if (tag) return tag;
    return text.replace(re, '<mark style="background:rgba(215,25,33,0.12);color:var(--text-primary);padding:1px 2px;border-radius:2px">$1</mark>');
  });
}

function highlightQuery(escaped, query) {
  if (!query) return escaped;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(re, '<mark style="background:rgba(215,25,33,0.12);color:var(--text-primary);padding:0 2px;border-radius:2px">$1</mark>');
}

// ── Tree view ──
function buildTree(sessions) {
  const root = { __children: {}, __sessions: [] };
  for (const s of sessions) {
    const path = s.project || '~';
    const parts = path.split('/').filter(Boolean);
    let node = root;
    for (const p of parts) {
      if (!node.__children[p]) node.__children[p] = { __children: {}, __sessions: [] };
      node = node.__children[p];
    }
    node.__sessions.push(s);
  }
  return renderTreeNode(root.__children, '', 0);
}

function renderTreeNode(node, prefix, depth) {
  let html = '';
  const keys = Object.keys(node).filter(k => !k.startsWith('__')).sort();

  for (const key of keys) {
    const child = node[key];
    const fullPath = prefix ? prefix + '/' + key : key;
    const allSessions = collectSessions(child);
    const count = allSessions.length;
    if (count === 0) continue;

    let displayKey = key;
    let current = child;
    while (true) {
      const subKeys = Object.keys(current.__children || {}).filter(k => !k.startsWith('__'));
      const dirSessions = current.__sessions || [];
      if (subKeys.length === 1 && dirSessions.length === 0) {
        displayKey += '/' + subKeys[0];
        current = current.__children[subKeys[0]];
      } else {
        break;
      }
    }

    const isOpen = state.expanded.has(fullPath);
    html += `<div class="tree-node">
      <div class="tree-dir" data-path="${esc(fullPath)}">
        <span class="arrow ${isOpen ? '' : 'closed'}">▾</span>
        ${esc(displayKey)}
        <span class="count">${count}</span>
      </div>
      <div class="tree-children ${isOpen ? '' : 'hidden'}">`;

    const currentSessions = current.__sessions || [];
    for (const s of currentSessions) {
      html += sessionItemHtml(s);
    }

    const finalChildren = current.__children || {};
    html += renderTreeNode(finalChildren, fullPath, depth + 1);

    html += '</div></div>';
  }
  return html;
}

function collectSessions(node) {
  let all = [...(node.__sessions || [])];
  const children = node.__children || {};
  for (const k of Object.keys(children).filter(k => !k.startsWith('__'))) {
    all = all.concat(collectSessions(children[k]));
  }
  return all;
}

// ── Recent view ──
function buildRecent(sessions) {
  const groups = {};
  for (const s of sessions) {
    const label = dateLabel(s.timestamp);
    (groups[label] = groups[label] || []).push(s);
  }
  let html = '';
  for (const [label, items] of Object.entries(groups)) {
    html += `<div class="date-group-label">${esc(label)}</div>`;
    for (const s of items) {
      html += sessionItemHtml(s);
    }
  }
  return html || '<div class="loading">[no sessions]</div>';
}

function sessionItemHtml(s) {
  return `<div class="session-item ${s.id === state.activeId ? 'active' : ''}" data-id="${esc(s.id)}">
    <div class="s-title">${esc(s.title)}</div>
    <div class="s-meta">${formatTime(s.timestamp)} · ${s.messageCount} msgs</div>
  </div>`;
}

// ── Sidebar clicks (bound once) ──
document.getElementById('sessionList').addEventListener('click', e => {
  const item = e.target.closest('.session-item');
  if (item) {
    const query = state.searchResults && state.searchQuery ? state.searchQuery : null;
    loadSession(item.dataset.id, query);
    return;
  }
  const dir = e.target.closest('.tree-dir');
  if (dir) {
    const path = dir.dataset.path;
    if (state.expanded.has(path)) state.expanded.delete(path);
    else state.expanded.add(path);
    renderSidebar();
  }
});

// ── Load session ──
async function loadSession(id, scrollToQuery) {
  state.activeId = id;
  renderSidebar();
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">[loading]</div>';
  const entries = await fetchJSON(`/api/session?id=${encodeURIComponent(id)}`);
  renderSession(entries, scrollToQuery);
}

// ── Render session ──
function renderSession(entries, scrollToQuery) {
  const main = document.getElementById('main');
  const info = entries.find(e => e.type === 'session') || {};
  const models = entries.filter(e => e.type === 'model_change');
  const model = models.length ? models[models.length - 1].modelId : '';

  let html = `<div class="session-bar">
    <div class="bar-info">${esc(info.cwd || '')} <span>· ${formatTime(info.timestamp)} · ${esc(model)}</span></div>
    <div class="seg-control mode-toggle">
      <button class="active" data-mode="conversation">Conversation</button>
      <button data-mode="full">Full</button>
    </div>
  </div><div class="messages" data-mode="conversation">`;

  let lastModel = '';
  for (const entry of entries) {
    if (entry.type === 'model_change') {
      if (lastModel && entry.modelId !== lastModel) {
        html += `<div class="model-divider msg-intermediate">— ${esc(entry.modelId)} —</div>`;
      }
      lastModel = entry.modelId;
      continue;
    }
    if (entry.type !== 'message') continue;
    const msg = entry.message;
    const stopReason = msg.stopReason || '';
    html += renderMessage(msg, stopReason, entry.id);
  }
  html += '</div>';
  main.innerHTML = html;

  if (scrollToQuery) {
    const msgs = main.querySelector('.messages');
    if (msgs) msgs.dataset.mode = 'full';
    const toggleBtns = main.querySelectorAll('.mode-toggle button');
    toggleBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === 'full'));

    requestAnimationFrame(() => {
      const queryLower = scrollToQuery.toLowerCase();
      const cards = main.querySelectorAll('.msg-card');
      for (const card of cards) {
        if (card.textContent.toLowerCase().includes(queryLower)) {
          const truncated = card.querySelector('.msg-text.truncated');
          if (truncated) truncated.classList.remove('truncated');
          const expandBtn = card.querySelector('.expand-btn');
          if (expandBtn) { expandBtn.textContent = '[ COLLAPSE ]'; expandBtn.dataset.action = 'collapse'; }

          card.querySelectorAll('.msg-text').forEach(el => {
            el.innerHTML = highlightInHtml(el.innerHTML, scrollToQuery);
          });

          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          card.style.borderLeftColor = 'var(--accent)';
          card.style.borderLeftWidth = '3px';
          setTimeout(() => { card.style.borderLeftColor = ''; card.style.borderLeftWidth = ''; }, 3000);
          break;
        }
      }
    });
  }
}

function renderMessage(msg, stopReason, entryId) {
  const role = msg.role;
  if (role === 'user') return renderUserMsg(msg);
  if (role === 'assistant') return renderAIMsg(msg, stopReason);
  if (role === 'toolResult') return renderToolResult(msg);
  return '';
}

function renderUserMsg(msg) {
  let text = '';
  for (const b of (msg.content || [])) {
    if (b.type === 'text') text += b.text;
  }
  return `<div class="msg-card user msg-conv">
    <div class="msg-role">You</div>
    <div class="msg-text">${escLink(text)}</div>
  </div>`;
}

function renderAIMsg(msg, stopReason) {
  const isFinal = stopReason === 'stop';
  const cssClass = isFinal ? 'msg-conv' : 'msg-intermediate';

  let parts = '';
  for (const b of (msg.content || [])) {
    if (b.type === 'text') {
      const text = b.text || '';
      const lineCount = text.split('\n').length;
      const needsTruncate = isFinal && lineCount > 5;
      parts += `<div class="msg-text ${needsTruncate ? 'truncated' : ''}">${escLink(text)}</div>`;
      if (needsTruncate) {
        parts += `<button class="expand-btn" data-action="expand">[ EXPAND ]</button>`;
      }
    } else if (b.type === 'thinking') {
      const t = b.thinking || '';
      if (!t) continue;
      parts += `<div class="thinking-label">Thinking</div>
        <div class="thinking-content">${esc(t)}</div>`;
    } else if (b.type === 'toolCall') {
      parts += renderToolCall(b);
    }
  }

  return `<div class="msg-card assistant ${cssClass}">
    <div class="msg-role">Assistant</div>
    ${parts}
  </div>`;
}

function renderToolCall(b) {
  const args = b.arguments || {};
  let summary = b.name || 'tool';
  if (args.command) summary += ` — ${truncStr(args.command, 60)}`;
  else if (args.path) summary += ` — ${args.path}`;

  let body = '';
  if (typeof args === 'string') {
    body = args;
  } else {
    const lines = [];
    for (const [k, v] of Object.entries(args)) {
      const s = typeof v === 'string' ? v : JSON.stringify(v);
      lines.push(`${k}: ${s}`);
    }
    body = lines.join('\n');
  }

  return `<div class="tool-block">
    <div class="tool-header" data-action="tool-toggle">
      <span class="t-arrow">▾</span> ${esc(summary)}
    </div>
    <div class="tool-body">${esc(body)}</div>
  </div>`;
}

function renderToolResult(msg) {
  let text = '';
  for (const b of (msg.content || [])) {
    if (b.type === 'text') text += b.text || '';
  }
  if (!text.trim()) return '';
  return `<div class="msg-card toolResult msg-intermediate">
    <div class="msg-role">Result</div>
    <div class="tool-output">${esc(text)}</div>
  </div>`;
}

// ── Main panel events (bound once) ──
function setupMainEvents() {
  document.getElementById('main').addEventListener('click', e => {
    const modeBtn = e.target.closest('[data-mode]');
    if (modeBtn && modeBtn.closest('.mode-toggle')) {
      const mode = modeBtn.dataset.mode;
      const msgs = document.querySelector('.messages');
      if (msgs) msgs.dataset.mode = mode;
      modeBtn.closest('.mode-toggle').querySelectorAll('button').forEach(b =>
        b.classList.toggle('active', b === modeBtn)
      );
      return;
    }

    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'expand' || action === 'expand-output') {
      const textEl = btn.previousElementSibling;
      if (textEl) textEl.classList.remove('truncated');
      btn.textContent = '[ COLLAPSE ]';
      btn.dataset.action = action === 'expand' ? 'collapse' : 'collapse-output';
    } else if (action === 'collapse' || action === 'collapse-output') {
      const textEl = btn.previousElementSibling;
      if (textEl) textEl.classList.add('truncated');
      btn.textContent = '[ EXPAND ]';
      btn.dataset.action = action === 'collapse' ? 'expand' : 'expand-output';
    } else if (action === 'tool-toggle') {
      const body = btn.nextElementSibling;
      const arrow = btn.querySelector('.t-arrow');
      if (body) {
        body.classList.toggle('hidden');
        if (arrow) arrow.classList.toggle('closed');
      }
    }
  });
}

// ── Helpers ──
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escLink(text) {
  let e = esc(text);
  e = e.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--interactive)">$1</a>');
  return e;
}
function truncStr(s, n) {
  return s.length > n ? s.slice(0, n) + '…' : s;
}
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function dateLabel(ts) {
  if (!ts) return 'Unknown';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) return 'Today';
  if (diff < 172800000) return 'Yesterday';
  if (diff < 604800000) return 'This week';
  if (diff < 2592000000) return 'This month';
  return d.toLocaleDateString([], { month: 'long', year: 'numeric' });
}

init();
</script>
